services:
  # Go API - Externally exposed
  api:
    image: golang:1.25-alpine
    container_name: api-dev
    ports:
      - 80:3000
    volumes:
      - ./api:/app
    command: go run main.go
    working_dir: /app
    env_file:
      - .env

