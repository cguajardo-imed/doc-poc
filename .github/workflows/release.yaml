name: Build & Release API

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to build binaries for'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Primary target: Amazon Linux 2023 on EC2 ARM64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          # Secondary targets
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Build
        working-directory: api
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -trimpath -ldflags="-s -w -X main.Version=${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}" \
            -o ../dist/summarizer-api-${{ matrix.suffix }}${{ matrix.ext || '' }} \
            ./main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: summarizer-api-${{ matrix.suffix }}
          path: dist/summarizer-api-${{ matrix.suffix }}${{ matrix.ext || '' }}
          retention-days: 1

  release:
    name: Create GitHub Release & Update Dist
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Copy files directory
        run: cp -r api/files dist/files

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push dist
        run: |
          git add -f dist/
          git commit -m "Update dist binaries for ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/summarizer-api-*
