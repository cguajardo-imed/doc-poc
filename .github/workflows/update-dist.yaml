name: Update Dist Binaries

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to build binaries for'
        required: true
        default: 'v1.0.0'

jobs:
  update-dist:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25'

    - name: Build Binaries
      run: |
        mkdir -p dist
        GOOS=linux GOARCH=amd64 go build -o dist/app-linux-amd64 ./api/main.go
        GOOS=windows GOARCH=amd64 go build -o dist/app-windows-amd64.exe ./api/main.go
        GOOS=darwin GOARCH=amd64 go build -o dist/app-darwin-amd64 ./api/main.go

    - name: Copy Files Directory
      run: |
        cp -r api/files dist/files

    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Commit and Push Changes
      run: |
        git add dist/
        git commit -m "Update binaries in /dist for ${{ github.event.inputs.release_tag }}"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}