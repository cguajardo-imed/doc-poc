services:
  api-dev:
    image: golang:1.25-alpine
    container_name: api-dev
    ports:
      - 8080:3000
    volumes:
      - ./api:/app
    command: go run main.go
    working_dir: /app
    env_file:
      - .env

  ollama:
    image: ollama/ollama:0.22.0
    container_name: ollama
    restart: unless-stopped
    ports:
      - 11434:11434
    volumes:
      - ./ollama:/root/.ollama
    environment:
      - OLLAMA_MODEL=gemma4:e2b
      - OLLAMA_PORT=11434
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_THREADS=1
      - OLLAMA_TOKENIZER=ggml
      - OLLAMA_NO_STREAM=true
      - OLLAMA_CACHE=true
      - OLLAMA_CACHE_DIR=/root/.ollama